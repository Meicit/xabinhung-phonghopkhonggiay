<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đại Biểu - UBND</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .meeting-card:active { transform: scale(0.98); }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans min-h-screen">
    
    <header class="bg-blue-800 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button id="back-btn" onclick="showMeetings()" class="hidden bg-blue-900 p-2 rounded-xl active:scale-90 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                </svg>
            </button>
            <h1 class="font-black uppercase text-xs tracking-widest" id="header-title">Danh sách phiên họp</h1>
        </div>
        
        <button onclick="location.reload()" class="bg-white text-blue-800 px-4 py-2 rounded-xl font-black text-[10px] uppercase shadow-md active:scale-95 transition-all flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            Tải lại trang
        </button>
    </header>

    <main class="container mx-auto p-4 max-w-2xl">
        
        <div id="meeting-container" class="grid grid-cols-1 gap-4 py-2">
            <p class="text-center text-slate-400 py-10 italic">Đang tải danh sách...</p>
        </div>

        <div id="document-container" class="hidden animate-in fade-in duration-300">
            <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 px-6 py-4 border-b border-slate-100 text-center">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Vui lòng chọn tài liệu để đọc</p>
                </div>
                <div id="file-list" class="divide-y divide-slate-100">
                    </div>
            </div>
        </div>

    </main>

    <div id="preview-modal" class="hidden fixed inset-0 z-[100] bg-black flex flex-col">
        <div class="bg-white p-4 flex justify-between items-center border-b">
            <span id="preview-title" class="font-bold text-sm truncate italic text-slate-700 pr-4">Tài liệu</span>
            <button onclick="closePreview()" class="bg-red-600 text-white px-8 py-3 rounded-2xl text-xs font-black uppercase shadow-lg active:scale-90 transition-all">Đóng</button>
        </div>
        <iframe id="preview-frame" src="" class="w-full flex-1 border-0 bg-slate-200"></iframe>
    </div>

    <script>
        const SUPABASE_URL = 'https://nohfiysijxwnuhakodvy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vaGZpeXNpanh3bnVoYWtvZHZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NjkzMjQsImV4cCI6MjA5MTQ0NTMyNH0.eG6JTSuNm6bDd2fs8YfNLo3zcyR2fKChrtNXoz4LKNU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadMeetings() {
            const { data } = await _supabase.from('documents').select('meeting_name');
            const uniqueMeetings = [...new Set(data?.map(item => item.meeting_name))];
            const container = document.getElementById('meeting-container');
            
            if (!uniqueMeetings || uniqueMeetings.length === 0) {
                container.innerHTML = "<p class='text-center text-slate-400 py-10'>Hiện chưa có tài liệu nào.</p>";
                return;
            }

            container.innerHTML = uniqueMeetings.map(m => `
                <div onclick="openMeeting('${m}')" class="meeting-card bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 flex justify-between items-center cursor-pointer transition-all hover:border-blue-500">
                    <div class="flex items-center gap-4 text-center">
                        <div class="bg-blue-50 p-4 rounded-2xl text-blue-600">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                            </svg>
                        </div>
                        <span class="font-black text-slate-800 text-lg block leading-none">${m}</span>
                    </div>
                    <div class="text-slate-300">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                        </svg>
                    </div>
                </div>
            `).join('');
        }

        async function openMeeting(meetingName) {
            document.getElementById('header-title').innerText = meetingName;
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('meeting-container').classList.add('hidden');
            document.getElementById('document-container').classList.remove('hidden');

            const { data } = await _supabase.from('documents').select('*').eq('meeting_name', meetingName).order('created_at', { ascending: false });
            const list = document.getElementById('file-list');
            
            list.innerHTML = data.map(f => `
                <div class="flex justify-between items-center p-6 active:bg-slate-50 transition-colors">
                    <span class="font-bold text-slate-700 text-sm truncate pr-4">${f.name}</span>
                    <button onclick="openPreview('${f.url}', '${f.name}')" class="bg-blue-600 text-white px-7 py-3 rounded-2xl text-[10px] font-black uppercase shadow-lg active:scale-90 transition-all">Xem trực tiếp</button>
                </div>
            `).join('') || "<div class='p-10 text-center text-slate-400 italic text-sm'>Không có tài liệu.</div>";
        }

        function showMeetings() {
            document.getElementById('header-title').innerText = "Danh sách phiên họp";
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('meeting-container').classList.remove('hidden');
            document.getElementById('document-container').classList.add('hidden');
            loadMeetings();
        }

        window.openPreview = (url, name) => {
            document.getElementById('preview-title').innerText = name;
            document.getElementById('preview-frame').src = `https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true`;
            document.getElementById('preview-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        };

        window.closePreview = () => {
            document.getElementById('preview-modal').classList.add('hidden');
            document.getElementById('preview-frame').src = "";
            document.body.style.overflow = 'auto';
        };

        loadMeetings();
    </script>
</body>
</html>
