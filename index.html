<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đại Biểu - Phòng Họp Không Giấy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <header class="bg-red-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-bold uppercase tracking-tight">Hệ Thống Họp Số</h1>
            <div id="connection-status" class="text-[10px] bg-red-900 px-2 py-1 rounded-full border border-red-400 italic">Đang kết nối...</div>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-2xl space-y-6">
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-100 px-5 py-3 border-b border-slate-200 flex justify-between items-center">
                <h2 class="font-bold text-slate-700">📄 TÀI LIỆU CUỘC HỌP</h2>
                <span class="text-[10px] text-slate-500 uppercase">Thời gian thực</span>
            </div>
            <div id="file-list" class="p-4 grid gap-3 text-sm text-center text-slate-400 italic">Đang tải tài liệu...</div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm border-t-4 border-blue-600 p-5">
            <h2 class="font-bold text-lg mb-3 text-blue-800">📊 BIỂU QUYẾT TRỰC TUYẾN</h2>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="vote('yes')" class="bg-green-600 text-white font-bold py-4 rounded-xl shadow-md active:scale-95 transition hover:bg-green-700">ĐỒNG Ý</button>
                <button onclick="vote('no')" class="bg-red-600 text-white font-bold py-4 rounded-xl shadow-md active:scale-95 transition hover:bg-red-700">KHÔNG ĐỒNG Ý</button>
            </div>
            <div class="mt-4 h-3 bg-slate-100 rounded-full overflow-hidden">
                <div id="vote-bar" class="bg-green-500 h-full transition-all duration-700" style="width: 0%"></div>
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm p-5 border border-slate-200">
            <h2 class="font-bold mb-4 text-slate-700">🎤 ĐĂNG KÝ PHÁT BIỂU</h2>
            <div class="flex gap-2">
                <input type="text" id="speaker-name" placeholder="Họ và tên đại biểu..." class="flex-1 border p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
                <button onclick="registerSpeech()" class="bg-blue-700 text-white px-6 rounded-xl font-bold hover:bg-blue-800 transition">GỬI</button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, increment, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTxFuyP3SjFvoRDdX5cvT94bH6KlWr-_M",
            authDomain: "phong-hop-khong-giay-6d773.firebaseapp.com",
            databaseURL: "https://phong-hop-khong-giay-6d773-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "phong-hop-khong-giay-6d773",
            storageBucket: "phong-hop-khong-giay-6d773.firebasestorage.app",
            messagingSenderId: "1026193403538",
            appId: "1:1026193403538:web:6083ad5c718dc8749b004b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Trạng thái mạng
        onValue(ref(db, ".info/connected"), (s) => {
            const el = document.getElementById('connection-status');
            el.innerText = s.val() ? "Trực tuyến" : "Mất kết nối";
            el.className = s.val() ? "text-[10px] bg-green-800 px-2 py-1 rounded-full border border-green-400" : "text-[10px] bg-red-800 px-2 py-1 rounded-full border border-red-400";
        });

        // Tài liệu (Lấy từ nhánh 'documents' do trang nhaplieu.html đẩy lên)
        onValue(ref(db, 'documents'), (snap) => {
            const list = document.getElementById('file-list');
            list.innerHTML = "";
            if (!snap.exists()) return list.innerHTML = "<p class='py-4'>Chưa có tài liệu cuộc họp.</p>";
            snap.forEach((c) => {
                const f = c.val();
                list.innerHTML += `<div class="flex justify-between items-center p-3 border-b border-slate-50 last:border-0 text-left">
                    <span class="font-medium text-slate-700 truncate mr-2">${f.name}</span>
                    <button onclick="window.open('${f.url}', '_blank')" class="bg-blue-600 text-white px-5 py-1.5 rounded-lg text-xs font-bold shadow-sm">XEM</button>
                </div>`;
            });
        });

        // Biểu quyết
        window.vote = (type) => {
            update(ref(db, 'votes'), { [type]: increment(1) }).then(() => alert("Đã gửi biểu quyết!"));
        };

        onValue(ref(db, 'votes'), (snap) => {
            const d = snap.val() || { yes: 0, no: 0 };
            const total = (d.yes || 0) + (d.no || 0);
            const p = total > 0 ? Math.round((d.yes / total) * 100) : 0;
            document.getElementById('vote-bar').style.width = p + '%';
        });

        // Đăng ký phát biểu
        window.registerSpeech = () => {
            const name = document.getElementById('speaker-name').value;
            if (!name) return alert("Vui lòng nhập tên");
            push(ref(db, 'speakers'), { name, time: new Date().toLocaleTimeString() });
            document.getElementById('speaker-name').value = "";
            alert("Đã đăng ký danh sách phát biểu!");
        };
    </script>
</body>
</html>
