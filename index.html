<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đại Biểu - Phòng Họp Số</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <header class="bg-red-700 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <h1 class="font-bold uppercase text-xs">UBND - Phòng Họp Không Giấy</h1>
        <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
    </header>

    <main class="container mx-auto p-4 max-w-2xl space-y-4">
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <label class="text-[10px] uppercase font-bold text-slate-400 mb-2 block">Chọn phiên họp:</label>
            <select id="meeting-filter" onchange="loadDocsByMeeting()" class="w-full bg-slate-100 p-3 rounded-xl font-bold text-blue-700 outline-none">
                <option value="ALL">--- Xem tất cả tài liệu ---</option>
            </select>
        </div>

        <section class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden min-h-[300px]">
            <div id="file-list" class="divide-y divide-slate-100"></div>
        </section>
    </main>

    <div id="preview-modal" class="hidden fixed inset-0 z-[100] bg-black flex flex-col">
        <div class="bg-white p-4 flex justify-between items-center">
            <span id="preview-title" class="font-bold text-sm truncate italic">Đang tải...</span>
            <button onclick="closePreview()" class="bg-red-600 text-white px-6 py-2 rounded-xl text-xs font-black uppercase">Đóng</button>
        </div>
        <iframe id="preview-frame" src="" class="w-full flex-1 border-0 bg-slate-200"></iframe>
    </div>

    <script>
        const SUPABASE_URL = 'https://nohfiysijxwnuhakodvy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vaGZpeXNpanh3bnVoYWtvZHZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NjkzMjQsImV4cCI6MjA5MTQ0NTMyNH0.eG6JTSuNm6bDd2fs8YfNLo3zcyR2fKChrtNXoz4LKNU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Lấy danh sách các tên cuộc họp duy nhất để vào ô Chọn
        async function loadMeetingNames() {
            const { data } = await _supabase.from('documents').select('meeting_name');
            const uniqueMeetings = [...new Set(data.map(item => item.meeting_name))];
            const select = document.getElementById('meeting-filter');
            const currentValue = select.value;
            
            select.innerHTML = '<option value="ALL">--- Xem tất cả tài liệu ---</option>' + 
                uniqueMeetings.map(m => `<option value="${m}">${m}</option>`).join('');
            select.value = currentValue;
        }

        async function loadDocsByMeeting() {
            const meetingFilter = document.getElementById('meeting-filter').value;
            let query = _supabase.from('documents').select('*').order('created_at', { ascending: false });
            
            if (meetingFilter !== "ALL") {
                query = query.eq('meeting_name', meetingFilter);
            }

            const { data } = await query;
            const list = document.getElementById('file-list');
            list.innerHTML = data.map(f => `
                <div class="flex justify-between items-center p-5 active:bg-slate-100">
                    <div>
                        <p class="text-[9px] text-blue-500 font-bold uppercase">${f.meeting_name}</p>
                        <p class="font-bold text-slate-700 text-sm">${f.name}</p>
                    </div>
                    <button onclick="openPreview('${f.url}', '${f.name}')" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase shadow-md">Xem</button>
                </div>
            `).join('') || "<p class='p-10 text-center text-slate-400 italic text-sm'>Không có tài liệu.</p>";
        }

        window.openPreview = (url, name) => {
            document.getElementById('preview-title').innerText = name;
            document.getElementById('preview-frame').src = `https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true`;
            document.getElementById('preview-modal').classList.remove('hidden');
        };

        window.closePreview = () => { document.getElementById('preview-modal').classList.add('hidden'); };

        // Tự động cập nhật danh sách mỗi 10 giây
        setInterval(() => {
            loadMeetingNames();
            loadDocsByMeeting();
        }, 10000);

        loadMeetingNames();
        loadDocsByMeeting();
    </script>
</body>
</html>
