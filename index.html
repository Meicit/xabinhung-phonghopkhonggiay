<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đại Biểu - Hệ Thống Họp Số UBND</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .pdf-container { height: calc(100vh - 80px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 select-none">
    <header class="bg-red-700 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
            <h1 class="font-bold uppercase text-sm tracking-tight">Hệ Thống Họp Không Giấy</h1>
        </div>
        <span class="text-[10px] opacity-70">iPad Pro/Air Optimized</span>
    </header>

    <main class="container mx-auto p-4 max-w-2xl space-y-6">
        <section class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-100 px-6 py-4 border-b border-slate-200">
                <h2 class="font-black text-slate-800 text-sm uppercase italic flex items-center gap-2">
                    <span>📄</span> Tài liệu phiên họp
                </h2>
            </div>
            <div id="file-list" class="divide-y divide-slate-100 min-h-[200px]">
                <p class="p-12 text-center text-slate-400 italic text-sm">Đang tải tài liệu...</p>
            </div>
        </section>

        <section class="bg-white p-6 rounded-3xl border border-slate-200 shadow-xl shadow-slate-200/50">
            <h2 class="font-bold mb-4 text-sm uppercase text-slate-600 tracking-wide border-l-4 border-blue-600 pl-3">Đăng ký phát biểu</h2>
            <div class="flex gap-2">
                <input type="text" id="speaker-name" placeholder="Nhập họ tên đại biểu..." class="flex-1 border-0 bg-slate-100 p-4 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-blue-500 transition">
                <button onclick="registerSpeech()" class="bg-blue-700 text-white px-8 rounded-2xl font-bold active:scale-95 transition shadow-lg shadow-blue-200">GỬI</button>
            </div>
        </section>
    </main>

    <div id="preview-modal" class="hidden fixed inset-0 z-[100] bg-black/90 flex flex-col">
        <div class="bg-white p-4 flex justify-between items-center shadow-xl">
            <span id="preview-title" class="font-bold text-slate-800 text-sm truncate mr-4 italic">Tài liệu</span>
            <button onclick="closePreview()" class="bg-red-600 text-white px-6 py-2 rounded-xl text-xs font-black uppercase shadow-lg">ĐÓNG [X]</button>
        </div>
        <div class="flex-1 w-full bg-slate-300">
            <iframe id="preview-frame" src="" class="w-full h-full border-0"></iframe>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://nohfiysijxwnuhakodvy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vaGZpeXNpanh3bnVoYWtvZHZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NjkzMjQsImV4cCI6MjA5MTQ0NTMyNH0.eG6JTSuNm6bDd2fs8YfNLo3zcyR2fKChrtNXoz4LKNU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadDocs() {
            const { data } = await _supabase.from('documents').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('file-list');
            if (!data || data.length === 0) {
                list.innerHTML = "<p class='p-12 text-center text-slate-400 italic text-sm'>Hiện chưa có tài liệu nào được tải lên.</p>";
                return;
            }
            list.innerHTML = data.map(f => `
                <div class="flex justify-between items-center p-5 hover:bg-slate-50 transition active:bg-slate-100">
                    <span class="font-bold text-slate-700 text-sm truncate pr-4">${f.name}</span>
                    <button onclick="openPreview('${f.url}', '${f.name}')" class="bg-blue-600 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase shadow-md active:scale-90 transition">Xem trực tiếp</button>
                </div>
            `).join('');
        }

        window.openPreview = (url, name) => {
            document.getElementById('preview-title').innerText = name;
            // Dùng Google Viewer tối ưu cho iPad
            document.getElementById('preview-frame').src = `https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true`;
            document.getElementById('preview-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        };

        window.closePreview = () => {
            document.getElementById('preview-modal').classList.add('hidden');
            document.getElementById('preview-frame').src = "";
            document.body.style.overflow = 'auto';
        };

        async function registerSpeech() {
            const name = document.getElementById('speaker-name').value;
            if (!name) return alert("Vui lòng nhập tên đại biểu!");
            const { error } = await _supabase.from('speakers').insert([{ name, time: new Date().toLocaleTimeString('vi-VN') }]);
            if (error) alert("Lỗi kết nối: " + error.message);
            else {
                document.getElementById('speaker-name').value = "";
                alert("Đã đăng ký phát biểu thành công!");
            }
        }

        setInterval(loadDocs, 5000); // Tự động cập nhật mỗi 5 giây
        loadDocs();
    </script>
</body>
</html>
