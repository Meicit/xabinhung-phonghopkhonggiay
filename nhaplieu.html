<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nhập Liệu - Google Drive Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-200 p-4">
    <main class="max-w-xl mx-auto space-y-6">
        <h1 class="text-xl font-bold text-yellow-500 text-center uppercase">Quản lý tài liệu Drive</h1>

        <section class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl">
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-500 block mb-1 uppercase">1. Tên tài liệu</label>
                    <input type="text" id="doc-name" placeholder="Ví dụ: Nghị quyết số 05..." class="w-full bg-gray-800 p-3 rounded-xl outline-none border border-gray-700 focus:border-blue-500">
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 block mb-1 uppercase">2. Link chia sẻ từ Google Drive</label>
                    <input type="text" id="doc-url" placeholder="Dán link 'Chia sẻ' vào đây..." class="w-full bg-gray-800 p-3 rounded-xl outline-none border border-gray-700 focus:border-blue-500 text-xs text-blue-300">
                </div>
                <button onclick="addDriveDoc()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold transition-all">CẬP NHẬT CHO ĐẠI BIỂU</button>
            </div>
            
            <div class="mt-4 p-3 bg-yellow-900/10 border border-yellow-800/30 rounded-lg text-[10px] text-yellow-600 italic">
                * Lưu ý: Hãy đảm bảo file trên Drive đã được bật chế độ "Bất kỳ ai có đường liên kết đều có thể xem".
            </div>
        </section>

        <div id="admin-list" class="space-y-2"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTxFuyP3SjFvoRDdX5cvT94bH6KlWr-_M",
            authDomain: "phong-hop-khong-giay-6d773.firebaseapp.com",
            databaseURL: "https://phong-hop-khong-giay-6d773-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "phong-hop-khong-giay-6d773"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.addDriveDoc = () => {
            const name = document.getElementById('doc-name').value;
            let url = document.getElementById('doc-url').value;

            if (!name || !url) return alert("Vui lòng điền đủ!");

            // Tự động chuyển đổi link Drive sang link trực tiếp
            if (url.includes('drive.google.com')) {
                const fileId = url.split('/d/')[1]?.split('/')[0];
                if (fileId) {
                    url = `https://drive.google.com/uc?export=view&id=${fileId}`;
                } else {
                    return alert("Link Drive không đúng định dạng!");
                }
            }

            push(ref(db, 'documents'), { name, url });
            document.getElementById('doc-name').value = "";
            document.getElementById('doc-url').value = "";
            alert("Đã thêm thành công!");
        };

        // Hiển thị danh sách để Admin xóa khi cần
        onValue(ref(db, 'documents'), (snap) => {
            const list = document.getElementById('admin-list');
            list.innerHTML = "";
            snap.forEach((c) => {
                list.innerHTML += `<div class="flex justify-between items-center p-2 bg-gray-800 rounded-lg text-xs">
                    <span class="truncate mr-2">${c.val().name}</span>
                    <button onclick="removeDoc('${c.key}')" class="text-red-500">Xóa</button>
                </div>`;
            });
        });

        window.removeDoc = (key) => {
            if(confirm("Xóa tài liệu này?")) remove(ref(db, `documents/${key}`));
        };
    </script>
</body>
</html>
