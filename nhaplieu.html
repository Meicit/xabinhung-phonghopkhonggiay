<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Trị - Nhập Liệu UBND</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-200 p-4 font-sans">
    <div class="max-w-4xl mx-auto space-y-6">
        <header class="text-center py-4 border-b border-gray-800">
            <h1 class="text-2xl font-black text-blue-500 uppercase">Hệ Thống Quản Trị Phiên Họp</h1>
        </header>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <section class="bg-gray-900 p-5 rounded-3xl border border-gray-800 shadow-2xl space-y-4">
                <h2 class="font-bold text-blue-400 italic text-sm uppercase">📁 Tải tài liệu mới</h2>
                
                <label class="block">
                    <span class="text-[10px] text-gray-500 uppercase ml-1">1. Chọn file tài liệu</span>
                    <input type="file" id="file-input" onchange="autoFillName()" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700 transition cursor-pointer mt-1">
                </label>

                <label class="block">
                    <span class="text-[10px] text-gray-500 uppercase ml-1">2. Tên hiển thị (Tự động lấy)</span>
                    <input type="text" id="doc-name" placeholder="Tên tài liệu..." class="w-full bg-gray-800 p-3 rounded-xl outline-none border border-gray-700 focus:border-blue-500 text-sm mt-1">
                </label>

                <label class="block">
                    <span class="text-[10px] text-gray-500 uppercase ml-1">3. Tên cuộc họp</span>
                    <input type="text" id="meeting-name" placeholder="VD: Họp UBND tuần 16" class="w-full bg-gray-800 p-3 rounded-xl outline-none border border-gray-700 focus:border-blue-500 text-sm mt-1">
                </label>

                <button onclick="handleUpload()" id="btn-upload" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-black transition-all">ĐĂNG TẢI</button>
                <div id="status" class="hidden text-center text-[10px] text-yellow-500 animate-pulse uppercase italic">Đang tải tài liệu lên hệ thống...</div>
            </section>

            <section class="lg:col-span-2 bg-gray-900 p-5 rounded-3xl border border-gray-800 shadow-2xl flex flex-col h-[550px]">
                <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-2">
                    <h2 class="font-bold text-green-400 italic text-sm uppercase">📋 Tài liệu đã nhập</h2>
                    <button onclick="clearData('documents')" class="text-[10px] text-red-500 hover:underline">Xóa sạch</button>
                </div>
                <div id="admin-doc-list" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
            </section>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://nohfiysijxwnuhakodvy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vaGZpeXNpanh3bnVoYWtvZHZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NjkzMjQsImV4cCI6MjA5MTQ0NTMyNH0.eG6JTSuNm6bDd2fs8YfNLo3zcyR2fKChrtNXoz4LKNU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // HÀM MỚI: Tự động lấy tên file bỏ đuôi định dạng
        function autoFillName() {
            const fileInput = document.getElementById('file-input');
            const nameInput = document.getElementById('doc-name');
            if (fileInput.files.length > 0) {
                const fullFileName = fileInput.files[0].name;
                // Bỏ phần mở rộng cuối cùng (vd: .pdf)
                const nameWithoutExt = fullFileName.substring(0, fullFileName.lastIndexOf('.')) || fullFileName;
                nameInput.value = nameWithoutExt;
            }
        }

        async function handleUpload() {
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            const meeting = document.getElementById('meeting-name').value;
            const docName = document.getElementById('doc-name').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('btn-upload');

            if (!file || !meeting || !docName) return alert("Vui lòng điền đủ thông tin!");

            status.classList.remove('hidden');
            btn.disabled = true;

            // Làm sạch tên file lưu trữ trên server
            const safeFileName = file.name.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9.]/g, "_");
            const fileName = `${Date.now()}_${safeFileName}`;

            const { data: stData, error: stError } = await _supabase.storage.from('tailieu').upload(fileName, file);
            if (stError) { alert(stError.message); status.classList.add('hidden'); btn.disabled = false; return; }

            const { data: urlData } = _supabase.storage.from('tailieu').getPublicUrl(fileName);
            await _supabase.from('documents').insert([{ name: docName, url: urlData.publicUrl, meeting_name: meeting }]);
            
            status.classList.add('hidden');
            btn.disabled = false;
            fileInput.value = ""; 
            document.getElementById('doc-name').value = "";
            fetchAdminDocs();
            alert("✅ Đã tải lên thành công!");
        }

        async function fetchAdminDocs() {
            const { data } = await _supabase.from('documents').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('admin-doc-list');
            container.innerHTML = data.map(d => `
                <div class="bg-gray-800 p-3 rounded-xl border border-gray-700 flex justify-between items-center group">
                    <div>
                        <p class="text-[9px] text-blue-400 font-bold uppercase tracking-wider">${d.meeting_name}</p>
                        <p class="text-sm font-medium text-gray-200">${d.name}</p>
                    </div>
                    <button onclick="deleteDoc('${d.id}')" class="text-red-500 p-2 opacity-0 group-hover:opacity-100 transition">Xóa</button>
                </div>
            `).join('') || "<p class='text-center text-gray-600 py-10'>Trống</p>";
        }

        async function deleteDoc(id) {
            if(confirm("Xóa vĩnh viễn tài liệu này?")) {
                await _supabase.from('documents').delete().eq('id', id);
                fetchAdminDocs();
            }
        }

        async function clearData(table) {
            if (confirm("Xóa sạch toàn bộ tài liệu?")) {
                await _supabase.from(table).delete().neq('id', 0);
                fetchAdminDocs();
            }
        }

        fetchAdminDocs();
    </script>
</body>
</html>
