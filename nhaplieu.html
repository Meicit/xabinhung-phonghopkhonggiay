<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Trị - Nhập Liệu UBND</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-200 p-6 font-sans">
    <div class="max-w-2xl mx-auto space-y-8">
        <header class="text-center border-b border-gray-800 pb-4">
            <h1 class="text-3xl font-black text-blue-500 uppercase tracking-tighter">Bảng Điều Khiển Nhập Liệu</h1>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <section class="bg-gray-900 p-6 rounded-3xl border border-gray-800 shadow-2xl">
                <h2 class="font-bold mb-5 text-blue-400 flex items-center gap-2 italic">📁 Tải file PDF từ máy tính</h2>
                <div class="space-y-4">
                    <input type="file" id="file-input" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700 transition cursor-pointer">
                    <input type="text" id="doc-name" placeholder="Tên hiển thị tài liệu..." class="w-full bg-gray-800 p-4 rounded-2xl outline-none border border-gray-700 focus:border-blue-500 transition text-sm">
                    <button onclick="handleUpload()" id="btn-upload" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-black transition-all shadow-lg shadow-blue-900/20">CẬP NHẬT TÀI LIỆU</button>
                    <div id="status" class="hidden text-center text-[10px] text-yellow-500 font-mono animate-pulse">Đang tải lên...</div>
                </div>
            </section>

            <section class="bg-gray-900 p-6 rounded-3xl border border-gray-800 shadow-2xl overflow-hidden">
                <div class="flex justify-between items-center mb-5 pb-2 border-b border-gray-800">
                    <h2 class="font-bold text-green-400 italic text-sm uppercase">🎤 Đăng ký phát biểu</h2>
                    <button onclick="clearData('speakers')" class="text-[10px] bg-red-900/30 text-red-500 px-3 py-1 rounded-full border border-red-900/50 hover:bg-red-600 hover:text-white transition">Xóa hết</button>
                </div>
                <div id="speaker-list" class="space-y-2 max-h-60 overflow-y-auto pr-2 custom-scrollbar text-sm">
                    <p class="text-gray-600 italic text-center text-xs">Chưa có dữ liệu</p>
                </div>
            </section>
        </div>

        <section class="bg-gray-900 p-4 rounded-2xl border border-gray-800 flex justify-between items-center">
            <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Hệ thống Supabase Cloud</span>
            <button onclick="clearData('documents')" class="bg-gray-800 hover:bg-red-900 text-gray-400 hover:text-white px-4 py-2 rounded-xl text-[10px] font-bold transition uppercase">Xóa toàn bộ tài liệu họp</button>
        </section>
    </div>

    <script>
        const SUPABASE_URL = 'https://nohfiysijxwnuhakodvy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vaGZpeXNpanh3bnVoYWtvZHZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NjkzMjQsImV4cCI6MjA5MTQ0NTMyNH0.eG6JTSuNm6bDd2fs8YfNLo3zcyR2fKChrtNXoz4LKNU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleUpload() {
            const file = document.getElementById('file-input').files[0];
            const name = document.getElementById('doc-name').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('btn-upload');

            if (!file || !name) return alert("Vui lòng chọn file và đặt tên!");

            status.classList.remove('hidden');
            btn.disabled = true;

            const fileName = `${Date.now()}_${file.name}`;

            const { data: stData, error: stError } = await _supabase.storage.from('tailieu').upload(fileName, file);
            if (stError) {
                alert("Lỗi Storage: " + stError.message);
                status.classList.add('hidden');
                btn.disabled = false;
                return;
            }

            const { data: urlData } = _supabase.storage.from('tailieu').getPublicUrl(fileName);
            const { error: dbError } = await _supabase.from('documents').insert([{ name, url: urlData.publicUrl }]);
            
            status.classList.add('hidden');
            btn.disabled = false;

            if (dbError) alert("Lỗi Database: " + dbError.message);
            else {
                alert("✅ Đã cập nhật tài liệu thành công!");
                document.getElementById('file-input').value = "";
                document.getElementById('doc-name').value = "";
            }
        }

        async function fetchSpeakers() {
            const { data } = await _supabase.from('speakers').select('*').order('created_at', { ascending: true });
            const container = document.getElementById('speaker-list');
            if (!data || data.length === 0) {
                container.innerHTML = "<p class='text-gray-600 text-center py-4 text-xs italic'>Trống</p>";
                return;
            }
            container.innerHTML = data.map(s => `
                <div class="flex justify-between p-3 bg-gray-800 rounded-xl border-l-4 border-green-500 shadow-inner">
                    <span class="font-bold text-gray-200">${s.name}</span>
                    <span class="text-gray-500 font-mono text-[10px]">${s.time}</span>
                </div>
            `).join('');
        }

        async function clearData(table) {
            if (!confirm(`Bạn chắc chắn muốn dọn dẹp ${table}?`)) return;
            const { error } = await _supabase.from(table).delete().neq('id', 0);
            if (error) alert("Lỗi: " + error.message);
            else location.reload();
        }

        setInterval(fetchSpeakers, 3000);
        fetchSpeakers();
    </script>
</body>
</html>
